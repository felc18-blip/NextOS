<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow root (NextOS runs system-wide as root) to own the PulseAudio
       compat bus name. Without this, pipewire-pulse logs
       "Failed to acquire org.pulseaudio.Server: AccessDenied" on every boot.
       Audio still works (the bus name is optional shim), but the spam is
       eliminated. -->
  <policy user="root">
    <allow own="org.pulseaudio.Server"/>
  </policy>
</busconfig>
