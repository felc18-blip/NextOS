# V13 Amlogic-no per-device — restaurar envs SDL/Vulkan que Piers tem em
# /etc/profile.d/99-emuelec.conf upstream e que faltam no nosso fork:
#   - XDG_RUNTIME_DIR=/run/user/0 + mkdir -p (resolve "XDG_RUNTIME_DIR is
#     invalid or not set" no log do testador V12)
#   - SDL_VIDEODRIVER=kmsdrm CONDICIONAL pra Valhall (s7d/s6/s5) — Piers
#     seta sempre (SDL2 dele so tem KMSDRM compilado, sem MALI; nosso SDL3
#     V13 tem MALI+KMSDRM, force so necessario pra Valhall pra evitar MALI
#     fbdev probe que confunde blob wayland-drm-dmaheap)
#   - SDL_KMSDRM_DEVICE_INDEX=0
#   - VK_ICD_FILENAMES + VK_LAYER_PATH (Vulkan via Mali blob)
#
# Carregado por /etc/profile loop em ordem alfabetica APOS 99-emuelec.conf
# (este arquivo carrega depois — pode override/adicionar). Per-device only:
# Amlogic-old/ng/nxtos/ne intocados.
#
# Nota: systemd services nao carregam /etc/profile.d/ — o detect inline em
# emustation.service.ExecStart (`grep s7d|s6|s5 /proc/device-tree/compatible
# && export SDL_VIDEODRIVER=kmsdrm`) cobre o service. Este arquivo cobre
# shells interactivos + ports launched via shell scripts.

# XDG runtime dir — Arch-R/PipeWire vive em /var/run/0-runtime-dir (o socket
# pulse/pipewire fica lá). Forçar /run/user/0 (herdado do Elite/weston) quebrava
# o áudio do ES (SDL tentava conectar no PulseAudio no dir errado → timeout ~30s
# x3 = boot lento + mudo). NÃO sobrescrever pro /run/user/0.
export XDG_RUNTIME_DIR=/var/run/0-runtime-dir

# Vulkan Mali ICD (libMali blob expoe entrypoints Vulkan tb)
export VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/mali.json
export VK_LAYER_PATH=/usr/share/vulkan/explicit_layer.d

# SDL KMSDRM device index (default 0, explicit pra evitar auto-scan duvidoso)
export SDL_KMSDRM_DEVICE_INDEX=0

# 2026-05-27: COMPOSITOR sway. Este device agora roda sway (dono unico do DRM)
# com ES/emuladores como CLIENTES wayland. Portanto NAO forçamos
# SDL_VIDEODRIVER=kmsdrm e NAO damos unset em WAYLAND_DISPLAY/SWAYSOCK — isso
# quebraria o caminho wayland. O SDL_VIDEODRIVER=wayland + WAYLAND_DISPLAY vem
# do 050-sway.conf, e a tríade meson (WLR_DRM_NO_ATOMIC=1 / WLR_NO_HARDWARE_
# CURSORS=1 / MALI_WAYLAND_AFBC=0) vem do quirk 090-ui_service. O fork
# rockchip-wlroots (-rk) importa os buffers wayland do blob Mali (ES renderiza).
#
# (Bloco antigo de força-kmsdrm + unset removido — era a era KMSDRM-direto.)
