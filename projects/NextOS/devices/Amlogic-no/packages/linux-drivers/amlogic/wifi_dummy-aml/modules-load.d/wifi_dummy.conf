# V14 Amlogic-no: wifi_dummy DESABILITADO no kernel 5.15.196 (CoreELEC 22 BSP).
#
# Razão: o módulo wifi_dummy é legado do Amlogic-old (kernel 3.14) — chama
# symbols extern_wifi_set_enable() + sdio_reinit() que requerem CONFIG_AMLOGIC_*
# no kernel host. No kernel 5.15.196 do Amlogic-no esses symbols não existem
# (ou retornam ENODEV no probe), gerando no journal a cada boot:
#   systemd-modules-load[XXX]: Failed to insert module 'wifi_dummy': No such device
#
# Cobertura alternativa pros chips WiFi modernos:
#   - aic8800-sdio.service + 80-aic8800-sdio.rules           — AIC8800 SDIO
#   - brcmfmac_sdio-firmware-aml.service + 80-brcmfmac_*.rules — Broadcom
#   - qca-firmware-aml.service + 80-qca-firmware-aml.rules    — Qualcomm
#   - rtkbt-firmware-aml.service + 80-rtkbt-firmware-aml.rules — Realtek
#   - 80-aml_w1.rules / 80-aml_w2.rules / 80-aml_bt.rules     — Amlogic w1/w2/bt
#
# Esses cuidam de power on + firmware load + module load via udev MODULE_ALIAS,
# tornando wifi_dummy redundante (e ruidoso) em -no.
#
# wifi_dummy
