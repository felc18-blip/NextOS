kernel.nmi_watchdog=0
# vm.swappiness=100 is the JELOS/ROCKNIX doctrine for zram+THP+MGLRU:
# aggressively swap anonymous memory into compressed RAM to keep physical
# RAM unfragmented for Huge Page allocations. nextos-memory-manager applies
# this at boot regardless; we mirror it here for static coherence.
vm.swappiness=100
vm.laptop_mode=0
vm.dirty_writeback_centisecs=1500
vm.dirty_expire_centisecs=3000
vm.vfs_cache_pressure=100
vm.dirty_ratio=10
vm.dirty_background_ratio=5
vm.page-cluster=0
