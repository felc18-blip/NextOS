#
# /etc/pacman.conf - NextOS pacman configuration
#
# See the pacman.conf(5) manpage for details.
#

[options]
# Paths adapted for NextOS (mutable state on /storage partition)
RootDir     = /
DBPath      = /var/lib/pacman/
CacheDir    = /var/cache/pacman/pkg/
LogFile     = /var/log/pacman.log
GPGDir      = /etc/pacman.d/gnupg/
HookDir     = /etc/pacman.d/hooks/

HoldPkg     = pacman glibc bash
Architecture = aarch64

# Signature checking - relaxed for initial setup
# Tighten to 'Required DatabaseOptional' after running pacman-key --init
SigLevel    = Optional TrustAll
LocalFileSigLevel = Optional

# Misc options
CheckSpace
ParallelDownloads = 3
Color

#
# Arch Linux ARM repositories
#

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[alarm]
Include = /etc/pacman.d/mirrorlist

[aur]
Include = /etc/pacman.d/mirrorlist
