#
# /etc/makepkg.conf - NextOS makepkg configuration
#

# Architecture
CARCH="aarch64"
CHOST="aarch64-unknown-linux-gnu"

# Compiler flags
CFLAGS="-march=armv8-a -O2 -pipe -fstack-protector-strong"
CXXFLAGS="${CFLAGS}"
LDFLAGS="-Wl,-O1,--sort-common,--as-needed,-z,relro,-z,now"

# Make flags
MAKEFLAGS="-j$(nproc)"

# Build environment
BUILDENV=(!distcc color !ccache check !sign)
OPTIONS=(strip docs !libtool !staticlibs emptydirs zipman purge !debug !lto)

# Paths (on writable /storage partition)
BUILDDIR=/storage/.pacman/build
PKGDEST=/storage/.pacman/packages
SRCDEST=/storage/.pacman/sources
LOGDEST=/storage/.pacman/logs

# Package output
PKGEXT='.pkg.tar.zst'
SRCEXT='.src.tar.gz'

# Compression
COMPRESSZST=(zstd -c -T0 -)
COMPRESSGZ=(gzip -c -f -n -)
COMPRESSXZ=(xz -c -z -T0 -)
